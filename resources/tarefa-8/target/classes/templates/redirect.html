<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Redirect Page</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f7f9fa; margin: 0; padding: 2rem; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h1 { color: #333; font-size: 1.5rem; margin-bottom: 1.5rem; border-bottom: 1px solid #eee; padding-bottom: 0.5rem; }
        .detail-row { display: flex; margin-bottom: 1rem; }
        .detail-label { font-weight: 600; color: #555; width: 80px; }
        .detail-value { color: #222; word-break: break-all; }
        .code { font-family: monospace; background: #f0f0f0; padding: 0.2rem 0.4rem; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Redirect Received</h1>
        <div class="detail-row">
            <div class="detail-label">User ID:</div>
            <div class="detail-value" th:text="${userId}"></div>
        </div>
        <div class="detail-row">
            <div class="detail-label">State:</div>
            <div class="detail-value" th:text="${state}"></div>
        </div>
        <div class="detail-row">
            <div class="detail-label">Code:</div>
            <div class="detail-value code" th:text="${code}"></div>
        </div>
    </div>
</body>
</html>
